name: publish-image

# Build hermes-webui-plus and push it to GHCR as the Railway service's source
# image. On push to main, manual dispatch, and a weekly rebuild (to pick up the
# latest base ghcr.io/nesquena/hermes-webui).
on:
  push:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC

concurrency:
  group: publish-image
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/al-kutub/hermes-webui-plus

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
